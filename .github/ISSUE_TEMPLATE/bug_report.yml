name: Bug report
description: Report behavior that is incorrect or surprising.
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps or a minimal README structure that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "24.15.0"
    validations:
      required: true
